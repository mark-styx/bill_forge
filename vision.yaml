additional_context: |
  Bill Forge is built as a modular monorepo with complete tenant isolation using
  database-per-tenant architecture. Each module (Invoice Capture, Invoice Processing,
  Vendor Management, Reporting) can be independently subscribed to.

  The backend is Rust with Axum for performance, using DuckDB for analytical workloads
  and PostgreSQL/SQLite for transactional data. The frontend is Next.js 14+ with
  TypeScript and Tailwind CSS.

  Key architectural decisions:
  - Database-per-tenant for complete data isolation
  - Local-first development with cloud deployment capability
  - S3-compatible storage abstraction
  - Multi-OCR provider support (local Tesseract + cloud options)

