# Production Docker Compose Configuration
# For production deployment with all services

version: '3.8'

services:
  # PostgreSQL - Production Configuration
  postgres:
    image: postgres:16-alpine
    container_name: billforge-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: billforge_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/control-plane:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis - Job Queue & Caching
  redis:
    image: redis:7-alpine
    container_name: billforge-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # MinIO - S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: billforge-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: billforge-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # Grafana - Monitoring Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: billforge-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # BillForge API Server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billforge-api-prod
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/billforge_control
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      TENANT_DB_PATH: /var/lib/billforge/tenants
      LOCAL_STORAGE_PATH: /var/lib/billforge/storage
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      QUICKBOOKS_CLIENT_ID: ${QUICKBOOKS_CLIENT_ID}
      QUICKBOOKS_CLIENT_SECRET: ${QUICKBOOKS_CLIENT_SECRET}
      QUICKBOOKS_REDIRECT_URI: ${QUICKBOOKS_REDIRECT_URI}
      QUICKBOOKS_ENVIRONMENT: ${QUICKBOOKS_ENVIRONMENT:-production}
      APP_URL: ${APP_URL}
    volumes:
      - billforge_data:/var/lib/billforge
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
      replicas: 2

  # Background Job Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: billforge-worker-prod
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/billforge_control
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      ENVIRONMENT: production
      TENANT_DB_PATH: /var/lib/billforge/tenants
    volumes:
      - billforge_data:/var/lib/billforge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      replicas: 2

  # Nginx - Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: billforge-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - billforge-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  billforge-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  billforge_data:
  nginx_logs:
