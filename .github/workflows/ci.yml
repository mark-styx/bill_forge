name: CI

on:
  push:
    branches: [main, develop, 'release/**']
    tags: ['v*']
  pull_request:
    branches: [main, develop, 'release/**']
  workflow_dispatch:
    inputs:
      run_db_tests:
        description: 'Run backend DB tests'
        required: false
        default: false
        type: boolean
      run_docker_build:
        description: 'Run Docker image builds'
        required: false
        default: false
        type: boolean
      run_full:
        description: 'Run all fast and heavy validation'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      db: ${{ steps.filter.outputs.db }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/backend-*.sh'
              - 'backend/Cargo.lock'
            frontend:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            db:
              - 'backend/migrations/**'
              - 'backend/crates/db/**'
              - 'backend/crates/api/src/routes/**'
              - 'backend/crates/api/src/state.rs'
              - 'backend/crates/api/src/openapi.rs'
              - 'backend/crates/api/tests/**'
              - 'scripts/backend-db-test.sh'
              - 'scripts/backend-doc-test.sh'
              - 'scripts/verify-db.sh'
            docker:
              - 'docker/**'
              - 'docker/Dockerfile.*'
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - 'backend/crates/**/Cargo.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'apps/web/package.json'

  # Backend Rust formatting and linting
  backend-static:
    name: Fast / Backend Static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .

    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run static backend checks
        run: bash scripts/backend-static-check.sh

  # Fast backend tests that do not require PostgreSQL.
  backend-unit-test:
    name: Fast / Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .

    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run backend unit tests
        run: bash scripts/backend-unit-test.sh

  # Backend tests that require PostgreSQL and validate migrations.
  backend-db-test:
    name: Heavy / Backend DB Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_full == 'true' || github.event.inputs.run_db_tests == 'true')) ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')) ||
        needs.changes.outputs.db == 'true'
      }}
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: billforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/billforge_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/billforge_test
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run backend DB tests
        run: bash scripts/backend-db-test.sh

      - name: Run backend doc tests
        run: bash scripts/backend-doc-test.sh

  # Frontend checks
  frontend-check:
    name: Fast / Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # Frontend tests
  frontend-test:
    name: Fast / Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter @billforge/web test:run

  # Security audit - blocks CI on P1 (critical/high) findings
  security-audit:
    name: Fast / Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run consolidated security audit
        run: bash scripts/security-audit.sh

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-report
          path: security-audit-report.json
          retention-days: 30

  # Docker build test
  docker-build:
    name: Heavy / Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_full == 'true' || github.event.inputs.run_docker_build == 'true')) ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v'))) ||
        needs.changes.outputs.docker == 'true'
      }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: false
          tags: billforge-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: billforge-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
