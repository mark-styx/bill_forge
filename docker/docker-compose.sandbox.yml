version: '3.8'

# Sandbox environment with all services for local development

services:
  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: billforge-sandbox-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sandbox_minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create MinIO bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/billforge-files --ignore-existing;
      mc anonymous set download myminio/billforge-files;
      exit 0;
      "

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: billforge-sandbox-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  sandbox_minio_data:

networks:
  default:
    name: billforge-sandbox-network
