name: OCR Implementation Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Set up Rust environment
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        
    - name: Install dependencies
      run: cargo build --all
    
    - name: Run tests
      run: cargo test --all
    
    - name: Run integration tests
      run: cargo test --features integration-tests
    
    - name: Run E2E tests
      run: npx playwright install && npx playwright test
    
    - name: Run performance tests
      run: npx k6 run load-test.js