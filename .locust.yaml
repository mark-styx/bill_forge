# Locust Project Configuration
# This file configures locust for this specific project/org
# Settings here override ~/.config/locust/config.yaml and defaults

# Git settings for this project (disabled until SSH configured)
git:
  remote_org: "bill_forge"
  remote_host: "github.com"
  remote_protocol: "ssh"
  ssh_key_path: ""
  auto_commit: false
  auto_push: false
  auto_create_remote: false
  commit_author_name: "Locust AI"
  commit_author_email: "locust@bill_forge.com"

# Model configuration - using Ollama for reliable programmatic access
# Note: Claude CLI can be slow/unreliable for non-interactive use
models:
  cto:
    backend: ollama
    model: deepseek-coder-v2:16b
    temperature: 0.7
  cpo:
    backend: ollama
    model: deepseek-coder-v2:16b
    temperature: 0.7
  engineering_manager:
    backend: ollama
    model: deepseek-coder-v2:16b
    temperature: 0.5
  backend_dev:
    backend: ollama
    model: qwen2.5-coder:7b
    temperature: 0.3
  frontend_dev:
    backend: ollama
    model: qwen2.5-coder:7b
    temperature: 0.3
  sre:
    backend: ollama
    model: qwen2.5-coder:7b
    temperature: 0.3
  qa:
    backend: ollama
    model: qwen2.5-coder:7b
    temperature: 0.3

# Default team for this project (overrides global default)
teams:
  default_team: ""

# Autonomous execution settings
autonomous:
  default_duration_hours: 1.0
  require_review_for_plans: false
  require_review_for_code: false

# Storage paths (relative to project root)
storage:
  base_path: ".locust/data"
  artifacts_path: ".locust/artifacts"

# Workflow settings with configurable review rubrics
workflow:
  max_design_iterations: 3
  max_implementation_iterations: 10

  # Target codebase for writing generated code
  # Code will be written here after successful integration review
  target_codebase: "/Users/mark/sentinel/bill_forge"
  write_code_to_codebase: true
  code_write_dry_run: false  # Set to true to test without actually writing files

  # Review rubrics - per-criterion weights and minimum scores
  rubrics:
    # Overall thresholds (total weighted score must meet these)
    design_approval_threshold: 70
    implementation_approval_threshold: 60
    integration_approval_threshold: 70

    # Implementation review criteria (weights sum to 100)
    # Focus on "does it work" over perfect docs/tests
    implementation:
      requirements_met:
        weight: 30
        min_score: 15      # Must satisfy core requirements
      code_quality:
        weight: 25
        min_score: 13
      error_handling:
        weight: 20
        min_score: 10
      testing:
        weight: 10
        min_score: 5      # Lenient - basic tests ok
      documentation:
        weight: 5
        min_score: 0      # Optional for now
      performance:
        weight: 10
        min_score: 5      # Optional for now
