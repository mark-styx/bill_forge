version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: billforge-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: billforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: billforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: billforge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Initialize MinIO bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/billforge-files --ignore-existing;
      mc anonymous set download myminio/billforge-files;
      exit 0;
      "

  # Rust API server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: billforge-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/billforge
      TENANT_DB_TEMPLATE: postgres://postgres:postgres@postgres:5432/{database}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-minimum-32-chars
      TOKEN_SECRET_KEY: dev-token-secret-change-in-production
      STORAGE_PROVIDER: s3
      S3_BUCKET: billforge-files
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      OCR_PROVIDER: tesseract
      FRONTEND_URL: http://localhost:3000
      APP_URL: http://localhost:8080
      ALLOWED_ORIGINS: http://localhost:3000
      RUST_LOG: info,billforge=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # Next.js frontend
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: billforge-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://api:8080

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: billforge-network
